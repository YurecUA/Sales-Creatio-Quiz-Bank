<script>
// ── RAW DATA ──────────────────────────────────────────────────────────────────
const RAW = JSON.parse(document.getElementById('quiz-data').textContent);


// ── NORMALIZE ─────────────────────────────────────────────────────────────────
function isOpenEnded(q) {
  return q.answers.length === 2 && q.answers.every(function(a) {
    return a.text === 'Correct' || a.text === 'Incorrect';
  });
}

var quizzes = RAW.quizzes.map(function(q, i) {
  return {
    id: i,
    title: q.activityTitle,
    poolSize: q.originalPoolSize,
    questions: q.questions.map(function(qu) {
      return Object.assign({}, qu, { isOpen: isOpenEnded(qu) });
    })
  };
});

// ── STATE ─────────────────────────────────────────────────────────────────────
let activeQuizId = null;
let mode = 'browse';
let testState = null;

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  document.getElementById('sidebar-nav').innerHTML = quizzes.map(q => `
    <div class="nav-item${activeQuizId === q.id ? ' active' : ''}" onclick="selectQuiz(${q.id})">
      <span class="material-icons">${q.questions.every(qu => qu.isOpen) ? 'edit_note' : 'assignment'}</span>
      <div class="nav-item-text">
        <div class="nav-item-title" title="${esc(q.title)}">${esc(q.title)}</div>
        <div class="nav-item-subtitle">Pool: ${q.poolSize} of ${q.questions.length}</div>
      </div>
      <span class="badge">${q.questions.length}</span>
    </div>
  `).join('');
}

function selectQuiz(id) {
  activeQuizId = id;
  testState = null;
  closeSidebar();
  renderSidebar();
  const quiz = quizzes[id];
  document.getElementById('toolbar-title').textContent = quiz.title;
  document.getElementById('toolbar-stats').innerHTML = `
    <span class="chip"><span class="material-icons">help_outline</span>${quiz.questions.length} questions</span>
    <span class="chip"><span class="material-icons">shuffle</span>Pool: ${quiz.poolSize}</span>
  `;
  document.getElementById('mode-toggle').style.display = 'flex';
  if (mode === 'browse') renderBrowse(quiz); else startTest(quiz);
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  if (activeQuizId !== null) {
    const quiz = quizzes[activeQuizId];
    if (m === 'browse') { testState = null; renderBrowse(quiz); } else startTest(quiz);
  }
}

// ── ESCAPE ────────────────────────────────────────────────────────────────────
function esc(t) { const d = document.createElement('div'); d.appendChild(document.createTextNode(t)); return d.innerHTML; }

// ── BROWSE ────────────────────────────────────────────────────────────────────
function renderBrowse(quiz) {
  const area = document.getElementById('content-area');
  area.innerHTML = quiz.questions.map((q, i) => {
    const type = q.isOpen ? 'open' : (q.multiSelect ? 'multi' : 'single');
    const icon = q.isOpen ? 'edit' : (q.multiSelect ? 'check_box' : 'radio_button_checked');
    const label = q.isOpen ? 'Open-ended' : (q.multiSelect ? 'Multiple choice' : 'Single choice');
    const answersHtml = q.isOpen
      ? `<div class="open-answer-box"><span class="material-icons">lightbulb</span><span>This is an open-ended question. Formulate your answer, then compare it with course materials or instructor feedback.</span></div>`
      : `<ul class="answers-list">${q.answers.map(a => `
          <li class="answer-item${a.correct ? ' correct' : ''}">
            <span class="answer-icon"><span class="material-icons">${a.correct ? 'check_circle' : 'radio_button_unchecked'}</span></span>
            <span class="answer-text">${esc(a.text)}</span>
          </li>`).join('')}</ul>`;
    return `
      <div class="question-card" style="animation-delay:${Math.min(i*0.03,0.3)}s">
        <div class="question-header">
          <div class="question-number">${i+1}</div>
          <div class="question-text">${esc(q.question)}</div>
          <span class="question-type-badge ${type}"><span class="material-icons">${icon}</span>${label}</span>
        </div>
        ${answersHtml}
      </div>`;
  }).join('');
  area.scrollTop = 0;
}

// ── TEST START ────────────────────────────────────────────────────────────────
function startTest(quiz) {
  const poolSize = Math.min(quiz.poolSize, quiz.questions.length);
  var pool = Array.prototype.slice.call(quiz.questions).sort(function() { return Math.random() - 0.5; }).slice(0, poolSize);
  testState = {
    quizId: quiz.id,
    questions: pool,
    currentIndex: 0,
    answers: pool.map(() => []),          // selected answer indices
    openTexts: pool.map(() => ''),        // open-ended textarea text
    checked: pool.map(() => false),
    finished: false
  };
  renderTestQuestion();
}

function renderTestQuestion() {
  if (!testState) return;
  if (testState.finished) { renderTestResults(); return; }
  const area = document.getElementById('content-area');
  const q = testState.questions[testState.currentIndex];
  const idx = testState.currentIndex;
  const total = testState.questions.length;
  const selected = testState.answers[idx];
  const isChecked = testState.checked[idx];
  const progress = ((idx + 1) / total) * 100;

  let answersHtml;
  if (q.isOpen) {
    const txtVal = esc(testState.openTexts[idx]);
    answersHtml = `
      <div class="open-test-area">
        <textarea id="open-textarea" placeholder="Type your answer here..."${isChecked ? ' class="checked" readonly' : ''}>${txtVal}</textarea>
        ${isChecked ? `<div class="open-hint"><span class="material-icons">auto_awesome</span>Self-assess: compare your answer with the course materials. This question is evaluated by the instructor.</div>` : ''}
      </div>`;
  } else {
    answersHtml = q.answers.map((a, ai) => {
      let cls = 'test-answer-item';
      if (!q.multiSelect) cls += ' single-choice';
      if (selected.includes(ai)) cls += ' selected';
      if (isChecked) {
        cls += ' checked';
        if (selected.includes(ai) && a.correct) cls += ' correct-selected';
        else if (selected.includes(ai) && !a.correct) cls += ' wrong-selected';
        else if (!selected.includes(ai) && a.correct) cls += ' correct-not-selected';
      }
      return `
        <div class="${cls}" onclick="toggleAnswer(${ai})"${isChecked ? ' style="pointer-events:none;"' : ''}>
          <div class="checkbox-icon"><span class="material-icons">check</span></div>
          <span class="test-answer-text">${esc(a.text)}</span>
        </div>`;
    }).join('');
  }

  const canCheck = q.isOpen
    ? (testState.openTexts[idx].trim().length > 0 || isChecked)
    : selected.length > 0;

  area.innerHTML = `
    <div class="test-container">
      <div class="test-progress">
        <span class="progress-text">Question ${idx+1} of ${total}</span>
        <div class="progress-bar-container"><div class="progress-bar" style="width:${progress}%"></div></div>
        <span class="progress-text">${getAnsweredCount()}/${total} answered</span>
      </div>
      <div class="test-question-card">
        <div class="question-header">
          <div class="question-number">${idx+1}</div>
          <div class="question-text">${esc(q.question)}</div>
          <span class="question-type-badge ${q.isOpen ? 'open' : (q.multiSelect ? 'multi' : 'single')}">
            <span class="material-icons">${q.isOpen ? 'edit' : (q.multiSelect ? 'check_box' : 'radio_button_checked')}</span>
            ${q.isOpen ? 'Open-ended' : (q.multiSelect ? 'Multiple' : 'Single')}
          </span>
        </div>
        ${answersHtml}
      </div>
      <div class="test-actions">
        <button class="btn btn-text" onclick="prevQuestion()"${idx===0?' disabled':''}>
          <span class="material-icons">arrow_back</span> Previous
        </button>
        <div style="display:flex;gap:8px;">
          ${!isChecked ? `<button class="btn btn-primary" onclick="checkAnswer()"${canCheck?'':' disabled'}>
            <span class="material-icons">done_all</span> Check
          </button>` : ''}
          ${idx < total-1
            ? `<button class="btn btn-accent" onclick="nextQuestion()">Next <span class="material-icons">arrow_forward</span></button>`
            : `<button class="btn btn-success" onclick="finishTest()"><span class="material-icons">flag</span> Finish</button>`}
        </div>
      </div>
    </div>`;
  area.scrollTop = 0;

  // attach live listener for open textarea
  if (q.isOpen && !isChecked) {
    const ta = document.getElementById('open-textarea');
    if (ta) ta.addEventListener('input', e => {
      testState.openTexts[testState.currentIndex] = e.target.value;
      // update check button state
      const checkBtn = document.querySelector('.btn-primary');
      if (checkBtn) checkBtn.disabled = e.target.value.trim().length === 0;
    });
  }
}

function toggleAnswer(ai) {
  if (!testState || testState.checked[testState.currentIndex]) return;
  const idx = testState.currentIndex;
  const q = testState.questions[idx];
  const sel = testState.answers[idx];
  if (q.multiSelect) {
    const pos = sel.indexOf(ai);
    pos >= 0 ? sel.splice(pos, 1) : sel.push(ai);
  } else {
    testState.answers[idx] = [ai];
  }
  renderTestQuestion();
}

function checkAnswer() {
  if (!testState) return;
  const idx = testState.currentIndex;
  const q = testState.questions[idx];
  if (q.isOpen) {
    // save textarea value before marking checked
    const ta = document.getElementById('open-textarea');
    if (ta) testState.openTexts[idx] = ta.value;
    // mark as answered (auto-correct for scoring)
    testState.answers[idx] = [0]; // index 0 = "Correct"
  }
  testState.checked[idx] = true;
  renderTestQuestion();
}

function nextQuestion() {
  if (!testState || testState.currentIndex >= testState.questions.length - 1) return;
  testState.currentIndex++;
  renderTestQuestion();
}

function prevQuestion() {
  if (!testState || testState.currentIndex <= 0) return;
  testState.currentIndex--;
  renderTestQuestion();
}

function getAnsweredCount() {
  return testState ? testState.checked.filter(Boolean).length : 0;
}

function isQuestionCorrect(qi) {
  const q = testState.questions[qi];
  if (q.isOpen) return testState.checked[qi]; // open = always "correct" if answered
  const sel = testState.answers[qi];
  const correct = q.answers.map((a, i) => a.correct ? i : -1).filter(i => i >= 0);
  return sel.length === correct.length && sel.every(s => correct.includes(s));
}

function finishTest() {
  if (!testState) return;
  // save open text if on that question
  const q = testState.questions[testState.currentIndex];
  if (q && q.isOpen) {
    const ta = document.getElementById('open-textarea');
    if (ta) testState.openTexts[testState.currentIndex] = ta.value;
    if (!testState.checked[testState.currentIndex] && testState.openTexts[testState.currentIndex].trim()) {
      testState.answers[testState.currentIndex] = [0];
      testState.checked[testState.currentIndex] = true;
    }
  }
  testState.checked = testState.checked.map(() => true);
  testState.finished = true;
  renderTestResults();
}

function renderTestResults() {
  const area = document.getElementById('content-area');
  const total = testState.questions.length;
  const openCount = testState.questions.filter(q => q.isOpen).length;
  const mcCount = total - openCount;
  let mcCorrect = 0;
  testState.questions.forEach((q, i) => { if (!q.isOpen && isQuestionCorrect(i)) mcCorrect++; });
  const pct = mcCount > 0 ? Math.round((mcCorrect / mcCount) * 100) : 100;
  const circumference = 2 * Math.PI * 70;
  const offset = circumference - (pct / 100) * circumference;
  const passed = pct >= 70;
  const color = mcCount === 0 ? 'var(--open-color)' : (passed ? 'var(--success)' : 'var(--error)');
  const displayPct = mcCount === 0 ? '—' : pct + '%';

  area.innerHTML = `
    <div class="score-card">
      <div class="score-circle">
        <svg viewBox="0 0 160 160" width="100%" height="100%">
          <circle cx="80" cy="80" r="70" fill="none" stroke="#e0e0e0" stroke-width="8"/>
          <circle cx="80" cy="80" r="70" fill="none" stroke="${color}" stroke-width="8"
            stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
            stroke-linecap="round" style="transition:stroke-dashoffset 1s ease;"/>
        </svg>
        <div class="score-value" style="color:${color}">${displayPct}</div>
        <div class="score-label">Score</div>
      </div>
      <h2>${mcCount === 0 ? 'All answered!' : (passed ? 'Great job!' : 'Keep practicing!')}</h2>
      <p>${mcCount === 0 ? 'This quiz contains open-ended questions only. Review your answers below.' : (passed ? 'You passed this practice test.' : 'You need 70% or higher to pass. Review the questions and try again.')}</p>
      <div class="score-details">
        ${mcCount > 0 ? `
          <div class="score-detail correct"><div class="value">${mcCorrect}</div><div class="label">Correct</div></div>
          <div class="score-detail wrong"><div class="value">${mcCount - mcCorrect}</div><div class="label">Wrong</div></div>
        ` : ''}
        ${openCount > 0 ? `<div class="score-detail open-q"><div class="value">${openCount}</div><div class="label">Open-ended</div></div>` : ''}
      </div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="startTest(quizzes[${testState.quizId}])">
          <span class="material-icons">refresh</span> Retry
        </button>
        <button class="btn btn-outline" onclick="reviewTest()">
          <span class="material-icons">visibility</span> Review
        </button>
      </div>
    </div>`;
  area.scrollTop = 0;
}

function reviewTest() {
  const area = document.getElementById('content-area');
  area.innerHTML = `
    <div class="test-container">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:8px;">
        <button class="btn btn-outline" onclick="renderTestResults()"><span class="material-icons">arrow_back</span> Results</button>
        <button class="btn btn-primary" onclick="startTest(quizzes[${testState.quizId}])"><span class="material-icons">refresh</span> Retry</button>
      </div>
      ${testState.questions.map((q, i) => {
        const ok = isQuestionCorrect(i);
        const borderColor = q.isOpen ? 'var(--open-color)' : (ok ? 'var(--success)' : 'var(--error)');
        const numBg = q.isOpen ? 'var(--open-color)' : (ok ? 'var(--success)' : 'var(--error)');
        const icon = q.isOpen ? 'edit_note' : (ok ? 'check_circle' : 'cancel');
        const iconColor = q.isOpen ? 'var(--open-color)' : (ok ? 'var(--success)' : 'var(--error)');

        let body;
        if (q.isOpen) {
          body = `
            <div style="margin-top:12px;">
              <div style="font-size:12px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">Your answer:</div>
              <div style="background:var(--open-bg);border-radius:6px;padding:12px 14px;color:var(--open-color);font-size:14px;line-height:1.6;white-space:pre-wrap;">${esc(testState.openTexts[i]) || '<em style="opacity:0.6">No answer provided</em>'}</div>
              <div class="open-answer-box" style="margin-top:8px;"><span class="material-icons">lightbulb</span>Compare with your instructor or course materials.</div>
            </div>`;
        } else {
          const sel = testState.answers[i];
          body = `<ul class="answers-list" style="margin-top:12px;">${q.answers.map((a, ai) => {
            const wasSelected = sel.includes(ai);
            const cls = 'answer-item' + (a.correct ? ' correct' : '');
            const icn = a.correct ? 'check_circle' : (wasSelected ? 'cancel' : 'radio_button_unchecked');
            const extra = wasSelected && !a.correct ? 'color:var(--error);font-weight:500;' : '';
            return `<li class="${cls}" style="${extra}">
              <span class="answer-icon"><span class="material-icons" style="${wasSelected && !a.correct ? 'color:var(--error)' : ''}">${icn}</span></span>
              <span class="answer-text" style="${extra}">${esc(a.text)}${wasSelected ? ' <em style="opacity:0.6">(your choice)</em>' : ''}</span>
            </li>`;
          }).join('')}</ul>`;
        }

        return `
          <div class="question-card" style="border-left:4px solid ${borderColor};animation-delay:${Math.min(i*0.03,0.3)}s">
            <div class="question-header">
              <div class="question-number" style="background:${numBg}">${i+1}</div>
              <div class="question-text">${esc(q.question)}</div>
              <span class="material-icons" style="font-size:28px;color:${iconColor}">${icon}</span>
            </div>
            ${body}
          </div>`;
      }).join('')}
    </div>`;
  area.scrollTop = 0;
}

// ── MOBILE ────────────────────────────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('visible');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('visible');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
try {
  renderSidebar();
  if (!quizzes || quizzes.length === 0) {
    throw new Error('quizzes array is empty');
  }
} catch(e) {
  console.error('INIT ERROR:', e);
  // Show error in nav for debugging
  var nav = document.getElementById('sidebar-nav');
  if (nav) {
    nav.innerHTML = '<div style="padding:16px;color:#f88;font-size:12px;">JS Error: ' + e.message + '</div>';
  }
}

// ── iOS / COMPAT FIXES ────────────────────────────────────────────────────────
// Fix 1: Real viewport height (iOS Safari address bar issue)
function fixHeight() {
  var h = window.innerHeight;
  var app = document.querySelector('.app-layout');
  var sb = document.getElementById('sidebar');
  if (app) app.style.height = h + 'px';
  if (sb) sb.style.height = h + 'px';
}
fixHeight();
window.addEventListener('resize', fixHeight);
window.addEventListener('orientationchange', function() {
  setTimeout(fixHeight, 100);
  setTimeout(fixHeight, 400);
});

// Fix 2: Make divs clickable on iOS Safari (needs touchstart on document)
document.addEventListener('touchstart', function() {}, { passive: true });

// Fix 3: Prefixed animation for older Safari
var style = document.createElement('style');
style.textContent = '@-webkit-keyframes fadeInUp { from { opacity:0; -webkit-transform:translateY(12px); } to { opacity:1; -webkit-transform:translateY(0); } }';
document.head.appendChild(style);

// Fix 3: Material Icons fallback map (when CDN not loaded from local file)
(function() {
  var iconMap = {
    'menu': '☰', 'school': '🎓', 'assignment': '📋', 'edit_note': '✏️',
    'menu_book': '📖', 'quiz': '❓', 'help_outline': '❓', 'shuffle': '🔀',
    'check_circle': '✓', 'radio_button_unchecked': '○', 'check_box': '☑',
    'radio_button_checked': '◉', 'edit': '✏', 'lightbulb': '💡',
    'check': '✓', 'arrow_back': '←', 'arrow_forward': '→', 'done_all': '✓✓',
    'flag': '⚑', 'refresh': '↺', 'visibility': '👁', 'cancel': '✗',
    'auto_awesome': '✨', 'check_circle_outline': '✓'
  };
  // Test if Material Icons loaded
  var testEl = document.createElement('span');
  testEl.className = 'material-icons';
  testEl.style.cssText = 'position:absolute;visibility:hidden;font-size:24px';
  testEl.textContent = 'check';
  document.body.appendChild(testEl);
  setTimeout(function() {
    var w = testEl.offsetWidth;
    document.body.removeChild(testEl);
    // If width is around 24px, icon font loaded. If much smaller, it hasn't.
    if (w < 20) {
      // Font not loaded — add CSS fallback
      document.querySelectorAll('.material-icons').forEach(function(el) {
        var key = el.textContent.trim();
        if (iconMap[key]) el.textContent = iconMap[key];
        el.style.fontFamily = 'sans-serif';
        el.style.fontStyle = 'normal';
      });
      // Observer for dynamically added icons
      var observer = new MutationObserver(function(muts) {
        muts.forEach(function(m) {
          m.addedNodes.forEach(function(n) {
            if (!n.querySelectorAll) return;
            n.querySelectorAll('.material-icons').forEach(function(el) {
              var key = el.textContent.trim();
              if (iconMap[key]) { el.textContent = iconMap[key]; el.style.fontFamily = 'sans-serif'; el.style.fontStyle = 'normal'; }
            });
          });
        });
      });
      observer.observe(document.body, { childList: true, subtree: true });
    }
  }, 1500);
}());
</script>
