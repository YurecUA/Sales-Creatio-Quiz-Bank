.answer-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border-radius: 6px; margin-bottom: 4px; font-size: 14px; line-height: 1.5; transition: background var(--transition); }

.test-container { max-width: 800px; margin: 0 auto; }

.test-question-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 32px; margin-bottom: 16px; animation: fadeInUp 0.3s ease forwards; }

.test-answer-item.checked.wrong-selected { border-color: var(--error); background: var(--error-bg); }
.test-answer-item.checked.correct-not-selected { border-color: var(--success); background: var(--success-bg); opacity: 0.7; }

.test-answer-item.selected .checkbox-icon .material-icons { color: #fff; font-size: 18px; }
.test-answer-item:not(.selected) .checkbox-icon .material-icons { display: none; }

.test-answer-item.checked.wrong-selected .checkbox-icon { border-color: var(--error); background: var(--error); }
.test-answer-item.checked.correct-not-selected .checkbox-icon { border-color: var(--success); background: transparent; }
.test-answer-text { flex: 1; font-size: 14px; line-height: 1.5; }

.open-test-area { margin-top: 16px; }
.open-test-area textarea { width: 100%; min-height: 120px; padding: 14px 16px; border: 2px solid var(--border); border-radius: 8px; font-family: 'Roboto', sans-serif; font-size: 14px; line-height: 1.6; color: var(--text); resize: vertical; transition: border-color var(--transition); outline: none; }

.btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 24px; border: none; border-radius: 24px; font-family: 'Roboto', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all var(--transition); text-transform: uppercase; letter-spacing: 0.5px; }
