text":"The history of read notifications is stored on the tab for a month since their creation","correct":true},{"id":4,"text":"Notifications about noteworthy events are stored on the tab for a month since their creation.","correct":true}]}]},{"ok":true,"pageTitle":"Sales Creatio Quiz","activityTitle":"CRM tools","href":"https://academy.creatio.com/group/23/module/58/restart-activity/65","itemId":"65","type":"restart-activity","contentId":29,"h5pLibrary":"H5P.QuestionSet 1.20","originalPoolSize":3,"totalQuestions":10,"randomQuestions":true,"progressType":"textual","questions":[{"id":1,"subContentId":"0d4ee0e3-9eb4-4d6c-82ae-74e41cd72ba5","title":"What is the purpose of the [Contacts] section?","question":"What is the purpose of the [Contacts] section?","multiSelect":false,"answers":[{"id":1,"text":"Managing information about contacts, group them by various parameters, and analyze the history of interactions with contacts","correct":true},{"id":2,"text":"Generating, editing and populating the partner database","correct":false},{"id":3,"text":"Registering information about companies that are partners, suppliers, sub-contractors or customers","correct":false},{"id":4,"text":"Determining what operations the Contacts can perform and what data they can see","correct":false}]},{"id":2,"subContentId":"ad63f8c8-2a9c-4818-9b51-ae0f26afe93f","title":"What is the purpose of the [Accounts] section in Creatio?","question":"What is the purpose of the [Accounts] section in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Managing information about accounts, group them by various parameters, and analyze the history of interactions","correct":true},{"id":2,"text":"Registering financial details of the partner companies and subcontractors","correct":false},{"id":3,"text":"Creating a registry list of legal documents connecting the company and its partners, subcontractors, suppliers and customers","correct":false},{"id":4,"text":"Communication with customers and partners, e.g., by sending emails","correct":false}]},{"id":3,"subContentId":"ac5f1553-f74c-4ab9-afdd-a5b891b695e5","title":"When can Creatio perform the duplicate search?","question":"When can Creatio perform the duplicate search?","multiSelect":true,"answers":[{"id":1,"text":"Each time a new record is created in these sections","correct":true},{"id":2,"text":"According to a pre-configured schedule","correct":true},{"id":3,"text":"Each working day","correct":true},{"id":4,"text":"Each time a record is edited in these sections","correct":true},{"id":5,"text":"Each time a user runs the corresponding business process in these sections","correct":true}]},{"id":4,"subContentId":"11aab4f5-c3e7-437d-8b61-18c40a2d2594","title":"Which of the following is available in the default [Tasks] section? Select all that apply.","question":"Which of the following is available in the default [Tasks] section? Select all that apply.","multiSelect":true,"answers":[{"id":1,"text":"Tasks timeline","correct":false},{"id":2,"text":"Task scheduling","correct":true},{"id":3,"text":"Viewing and planning the activities of other employees","correct":true},{"id":4,"text":"Prioritizing the Tasks","correct":true},{"id":5,"text":"Track interconnections between activities","correct":true}]},{"id":5,"subContentId":"2ca89f68-ce6d-4222-9096-4215c2e9fe2f","title":"What information do you store in the [Employees] section of Creatio?","question":"What information do you store in the [Employees] section of Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Full information about company employees, including personal data, contacts, information about career changes within the company","correct":true},{"id":2,"text":"The 360 view of all contacts who are employees of the partner companies, including their personal data, communication options, as well as the decision-making role","correct":false},{"id":3,"text":"Contact phone numbers, addresses and other communication options of the company employees","correct":false},{"id":4,"text":"Full names of all employees including segmentation by the support lines","correct":false}]},{"id":6,"subContentId":"5faafb76-2e49-4699-a0c1-e97f911832ff","title":"What is the purpose of the [Knowledge base] section in Creatio?","question":"What is the purpose of the [Knowledge base] section in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Managing the electronic catalog of the company\u2019s legal documents","correct":false},{"id":2,"text":"Managing the documents and the employee database","correct":false},{"id":3,"text":"Managing the company policy and regulations","correct":false},{"id":4,"text":"Managing the catalog of useful links for accessing marketing materials and promotional brochures","correct":false},{"id":5,"text":"Managing the digital library of reference information used by employees every day","correct":true}]},{"id":7,"subContentId":"d2e6d18f-cbae-4fca-abcf-1ad863c51f7b","title":"What is the purpose of the [Webhooks] section in Creatio?","question":"What is the purpose of the [Webhooks] section in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Analyzing incoming webhooks as well as view parsed results and errors in parsing","correct":true},{"id":2,"text":"Setting up the interface of landing pages","correct":false},{"id":3,"text":"Tracking and registering customer activities in Creatio using the company web site","correct":false},{"id":4,"text":"Creating landing pages by developer means","correct":false}]},{"id":8,"subContentId":"d3078586-701b-41ca-8095-b84f41e35eda","title":"What is a \u201cLanding page\u201d in the Creatio terminology?","question":"What is a \u201cLanding page\u201d in the Creatio terminology?","multiSelect":false,"answers":[{"id":1,"text":"The home page of the corporate web site","correct":false},{"id":2,"text":"An advertisement campaign targeted at attracting new leads and registering them in Creatio","correct":false},{"id":3,"text":"An element in the Process Designer","correct":false},{"id":4,"text":"A standalone website page that is designed for a call to action, which enables you to set up the registration of any new objects in Creatio","correct":true},{"id":5,"text":"A new lead created in Creatio via populating a web form or performing any other action on the company web site","correct":false}]},{"id":9,"subContentId":"3e228010-1bae-428a-8e98-831f23061cd3","title":"What is the purpose of Customer 360 app? Select all that apply","question":"What is the purpose of Customer 360 app? Select all that apply","multiSelect":true,"answers":[{"id":1,"text":"Creating and maintaining extensive databases of contacts and accounts","correct":true},{"id":2,"text":"Forecasting sales per Contact","correct":false},{"id":3,"text":"Managing internal employee schedules and tasks","correct":false},{"id":4,"text":"Viewing detailed customer interactions and history","correct":true},{"id":5,"text":"Represent any type of relationship between contacts and accounts in Creatio","correct":true}]},{"id":10,"subContentId":"1e8b6d50-c695-44ba-9ea2-fb3f6d6b7870","title":"What is the purpose of the Tags in Creatio?","question":"What is the purpose of the Tags in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Segmenting the records","correct":true},{"id":2,"text":"Controlling user permissions or access to records","correct":false},{"id":3,"text":"Creating automated workflows or triggers within the system","correct":false},{"id":4,"text":"Defining record relationships or hierarchies","correct":false}]}]},{"ok":true,"pageTitle":"Sales Creatio Quiz","activityTitle":"Sales tools","href":"https://academy.creatio.com/group/23/module/58/restart-activity/72","itemId":"72","type":"restart-activity","contentId":36,"h5pLibrary":"H5P.QuestionSet 1.20","originalPoolSize":10,"totalQuestions":20,"randomQuestions":true,"progressType":"textual","questions":[{"id":1,"subContentId":"76584039-ca4f-4dff-ad32-b074f0c9c1c6","title":"What is a \u201clead\u201d in the Creatio terminology?","question":"What is a \u201clead\u201d in the Creatio terminology?","multiSelect":false,"answers":[{"id":1,"text":"A potential customer ready to purchase your products or services","correct":false},{"id":2,"text":"A reference to an existing customer to a potential client for your company","correct":false},{"id":3,"text":"A potential or existing customer\u2019s need in your products or services","correct":true},{"id":4,"text":"A newly created record in the \u201cLeads\u201d section of Creatio","correct":false},{"id":5,"text":"A contact or account interested in your company\u2019s products or services","correct":false}]},{"id":2,"subContentId":"ab3b93e0-40ad-4e97-b5f8-b68e3c7dd55e","title":"What best defines the out-of-the-box \u201clead management\u201d process in Creatio?","question":"What best defines the out-of-the-box \u201clead management\u201d process in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Attracting potential customers via cold calls, TV ads, and other \u201coutbound\u201d channels","correct":false},{"id":2,"text":"Handling customer needs from initial detection to qualification and seamless handoff to the sales team","correct":true},{"id":3,"text":"Providing support to potential customers and processing their feedback","correct":false},{"id":4,"text":"Handing a potential customer to another team to gather more information on the this customer","correct":false},{"id":5,"text":"Establishing a relationship with potential customers and monitoring communication with them","correct":false}]},{"id":3,"subContentId":"5749ca81-6996-4007-ba9b-bf03a6ec28e1","title":"What is the purpose of the [Leads] section?","question":"What is the purpose of the [Leads] section?","multiSelect":false,"answers":[{"id":1,"text":"Managing confirmed interest in your product up to conversion of the lead into an opportunity","correct":true},{"id":2,"text":"Creating an audience of potential customers for marketing campaigns","correct":false},{"id":3,"text":"Adding potential customer accounts to Creatio","correct":false},{"id":4,"text":"Registering customers from landing pages","correct":false},{"id":5,"text":"Improving communication with potential customers","correct":false}]},{"id":4,"subContentId":"831d97ba-74f3-4e4c-ae2d-37a1faf2a249","title":"What is a \u201cSales pipeline\u201d in the Creatio terminology?","question":"What is a \u201cSales pipeline\u201d in the Creatio terminology?","multiSelect":false,"answers":[{"id":1,"text":"A tool that shows stages that a customer or a potential customer goes through from the moment of the first contact to signing the deal","correct":true},{"id":2,"text":"The ratio of successful and lost opportunities within a specified period","correct":false},{"id":3,"text":"Stages of lead nurturing and handing the lead off to sales","correct":false},{"id":4,"text":"A dashboard displaying the sales volume dynamics within a specified period","correct":false},{"id":5,"text":"Opportunities by owners","correct":false}]},{"id":5,"subContentId":"bc1da825-b427-4ed3-8da0-76b11e0c8936","title":"How can you track offers from competitors in Creatio when working with opportunities?","question":"How can you track offers from competitors in Creatio when working with opportunities?","multiSelect":false,"answers":[{"id":1,"text":"By using Competitors list on the opportunity form page to list competing products, their streghts and weaknesses","correct":true},{"id":2,"text":"It is impossible to track competitors\u2019 offers in Creatio","correct":false},{"id":3,"text":"By filling out Account profile with type Competitor and listing opportunities that our company competes with them","correct":false},{"id":4,"text":"By chatting with colleagues in the feed","correct":false}]},{"id":6,"subContentId":"582ea754-5468-45b0-b508-81128bd4166c","title":"What is the purpose of the [Opportunities] section?","question":"What is the purpose of the [Opportunities] section?","multiSelect":false,"answers":[{"id":1,"text":"Manage deals from qualification to closing the deal","correct":true},{"id":2,"text":"Manage customer needs in the company\u2019s offerings, qualifying and nurturing them","correct":false},{"id":3,"text":"View sales statistics and match actual sales volumes to the forecasted volumes","correct":false},{"id":4,"text":"Manage company\u2019s career opportunities, hiring and onboarding of new employees","correct":false}]},{"id":7,"subContentId":"1e3d1cb3-468c-4317-84b8-5fc712fc88c6","title":"What is the purpose of the [Orders] section in Creatio?","question":"What is the purpose of the [Orders] section in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"To registering the account receivables","correct":false},{"id":2,"text":"To integrate with QuickBooks","correct":false},{"id":3,"text":"To store customer payment details","correct":false},{"id":4,"text":"To manage and fulfill customer orders","correct":true}]},{"id":8,"subContentId":"9903f9ba-f3dd-4aa5-9702-632be7a96f98","title":"How do you provide a discount for an order in Creatio?","question":"How do you provide a discount for an order in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Product discounts are not available in Creatio","correct":false},{"id":2,"text":"To provide a discount, you need to change the price of the product in Product section","correct":false},{"id":3,"text":"Manually change the order total","correct":false},{"id":4,"text":"Discounts can be provided per product on the order form page","correct":true}]},{"id":9,"subContentId":"3edb1c01-d866-461c-9dd5-1253df5daaf4","title":"What is the purpose of the [Invoices] section?","question":"What is the purpose of the [Invoices] section?","multiSelect":false,"answers":[{"id":1,"text":"To create and edit the invoice templates","correct":false},{"id":2,"text":"To manage company invoices","correct":true},{"id":3,"text":"To store information on legal documents connected to orders","correct":false},{"id":4,"text":"Integration with QuickBooks","correct":false},{"id":5,"text":"To register financial details of contacts and accounts","correct":false}]},{"id":10,"subContentId":"1132b5b3-d56d-4937-8c44-9f2be0b13e4e","title":"What is the purpose of the [Products] section?","question":"What is the purpose of the [Products] section?","multiSelect":false,"answers":[{"id":1,"text":"Registering new products and linking them to corresponding contracts","correct":false},{"id":2,"text":"Managing your products and services","correct":true},{"id":3,"text":"Automation of selecting products for orders and invoices","correct":false},{"id":4,"text":"Creating a print-ready product catalog","correct":false},{"id":5,"text":"Monitoring the product prices","correct":false}]},{"id":11,"subContentId":"36a6294b-c75c-4599-850f-6cfbc4adf6e5","title":"How does Creatio determine a price for a specific product?","question":"How does Creatio determine a price for a specific product?","multiSelect":false,"answers":[{"id":1,"text":"The price is determined by the base price list, if it is selected in the settings. If the price list is not filled in the settings, then the price value from the personal price list is used","correct":false},{"id":2,"text":"The price is determined in the personal price list. If it is not filled in, then the price list specified as the base one is used. If the base price list is also not specified, then the price from product page is used","correct":true},{"id":3,"text":"The price listed on the product page is used. If the price is not specified, then the personal price list is used","correct":false},{"id":4,"text":"Creatio always uses the price from the product catalog. If the price in the product catalog is not set, then the base price list is used","correct":false}]},{"id":12,"subContentId":"0bb66169-c1b0-4e11-a543-00ea3eb19e44","title":"Which app is best used for managing document flow in Creatio?","question":"Which app is best used for managing document flow in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Lead and Opportunity Management application","correct":false},{"id":2,"text":"Order and Contract Management application","correct":true},{"id":3,"text":"Productivity application","correct":false}]},{"id":13,"subContentId":"60223403-f396-4ec8-8d8b-d5a31ac7dc8f","title":"What is the purpose of the [Documents] section in Creatio?","question":"What is the purpose of the [Documents] section in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Managing marketing templates and promotional materials","correct":false},{"id":2,"text":"Managing product specifications, price lists, and product catalogs","correct":false},{"id":3,"text":"Managing company\u2019s internal and external documents (e.g., regulations, meeting minutes, etc.)","correct":true},{"id":4,"text":"Managing stakeholders\u2019 documents and contracts","correct":false},{"id":5,"text":"Managing employee documentation","correct":false}]},{"id":14,"subContentId":"6acb7723-1f08-42d3-8e3a-6abd225ec1fe","title":"Select all statements that are true.","question":"Select all statements that are true.","multiSelect":true,"answers":[{"id":1,"text":"Order and Contract Management app is a solution that helps manage orders, issue invoices and handle document flow","correct":true},{"id":2,"text":"Lead and Opportunity Management app is used for managing the whole sales funnel, from incoming lead to closing the deal","correct":true},{"id":3,"text":"Field Sales app is a product for sales management in the agricultural sector","correct":false}]},{"id":15,"subContentId":"5ed77f94-46cc-4be6-960a-14f64eea19bb","title":"What is the purpose of the [Forecasts] section?","question":"What is the purpose of the [Forecasts] section?","multiSelect":false,"answers":[{"id":1,"text":"Forecasting the budgets of new opportunities based on historical data","correct":false},{"id":2,"text":"Calculating the expected ROI by accounts","correct":false},{"id":3,"text":"Planning the financial, quantitative and temporal metrics by different entities","correct":true},{"id":4,"text":"Determining the best marketing strategies for working with new leads","correct":false},{"id":5,"text":"Predicting the response data for the [Emails] and [Events] sections","correct":false}]},{"id":16,"subContentId":"a07c28ae-f5be-489f-9a32-7d15ca1c13d9","title":"How do you populate the forecasted and actual data in a forecast? Select all that apply.","question":"How do you populate the forecasted and actual data in a forecast? Select all that apply.","multiSelect":true,"answers":[{"id":1,"text":"Run a custom business process","correct":false},{"id":2,"text":"Enter manually","correct":true},{"id":3,"text":"Calculate based on a formula","correct":true},{"id":4,"text":"Pull the data from Creatio","correct":true}]},{"id":17,"subContentId":"7999a1ac-b680-486f-bf4b-b9f2e8b59d2f","title":"What is \u201cField Sales\u201d?","question":"What is \u201cField Sales\u201d?","multiSelect":false,"answers":[{"id":1,"text":"A Creatio Marketplace application for automating sales in the agricultural sector","correct":false},{"id":2,"text":"A Creatio Marketplace application for managing field sales","correct":true},{"id":3,"text":"A Creatio section designed for planning field sales","correct":false},{"id":4,"text":"A Creatio product for registering and monitoring the whole cycle of field sales","correct":false},{"id":5,"text":"A Creatio product combining Sales Creatio and Service Creatio","correct":false}]},{"id":18,"subContentId":"c694930e-9900-4f15-b7bd-8c663971c902","title":"Which features are available in the Field Sales application? Select all that apply.","question":"Which features are available in the Field Sales application? Select all that apply.","multiSelect":true,"answers":[{"id":1,"text":"Scheduling the sales reps\u2019 visits to sales outlets","correct":true},{"id":2,"text":"Maintaining the visit agenda and guidelines","correct":true},{"id":3,"text":"Building routes on the map","correct":true},{"id":4,"text":"Visit \u201cto-do\u201d lists","correct":true},{"id":5,"text":"Planning field sales by different metrics","correct":false}]},{"id":19,"subContentId":"a4c2a870-c40f-4f26-8932-2ba30306b576","title":"What are similar leads in the Leads section?","question":"What are similar leads in the Leads section?","multiSelect":false,"answers":[{"id":1,"text":"Leads that are considered duplicates are displayed in Similar leads list. These duplicates cannot be merged","correct":true},{"id":2,"text":"Similar leads are leads generated by the same owner in Creatio","correct":false},{"id":3,"text":"Similar leads are leads that were received from different lead channels for the same customer need","correct":false},{"id":4,"text":"Similar leads are leads created on the same day that are considered duplicates","correct":false}]},{"id":20,"subContentId":"c35f2a19-104d-49b0-b717-45438662929a","title":"What is a product catalog in Sales Creatio?","question":"What is a product catalog in Sales Creatio?","multiSelect":false,"answers":[{"id":1,"text":"The product catalog is a separate folder tree component that is used to selection of products in Order section","correct":true},{"id":2,"text":"The product catalog is a printable generated based on products and services the company offers","correct":false},{"id":3,"text":"The product catalog is preselect list of products that can be offered to the specific customer","correct":false}]}]},{"ok":true,"pageTitle":"Sales Creatio Quiz","activityTitle":"No-code customization","href":"https://academy.creatio.com/group/23/module/58/restart-activity/67","itemId":"67","type":"restart-activity","contentId":31,"h5pLibrary":"H5P.QuestionSet 1.20","originalPoolSize":4,"totalQuestions":28,"randomQuestions":true,"progressType":"textual","questions":[{"id":1,"subContentId":"9eb41c9e-e0bd-4080-a820-a655cd4040e7","title":"How many workplaces can display the same section?","question":"How many workplaces can display the same section?","multiSelect":false,"answers":[{"id":1,"text":"Only one","correct":false},{"id":2,"text":"No more than 5","correct":false},{"id":3,"text":"Unlimited","correct":true},{"id":4,"text":"Three workplaces, including the portal one","correct":false},{"id":5,"text":"Depending on the corresponding system setting","correct":false}]},{"id":2,"subContentId":"7fb7f5bf-3759-4a9d-9b75-33e5e16ca2ff","title":"What is a \u201cbusiness rule\u201d from the Creatio standpoint?","question":"What is a \u201cbusiness rule\u201d from the Creatio standpoint?","multiSelect":false,"answers":[{"id":1,"text":"A company regulation describing specific business behavior","correct":false},{"id":2,"text":"A model of company business structure","correct":false},{"id":3,"text":"A tool that enables configuring business logic of record pages","correct":true},{"id":4,"text":"A developer tool used for configuration purposes in the backend","correct":false},{"id":5,"text":"A machine learning model designed to predict values in the page fields","correct":false}]},{"id":3,"subContentId":"c0642af1-49fc-4ff4-98d1-1bfdbf573e20","title":"What needs to be done before you start designing the MS word report template layout?","question":"What needs to be done before you start designing the MS word report template layout?","multiSelect":false,"answers":[{"id":1,"text":"Create a report record in the report setup and set up the report data and report tables","correct":true},{"id":2,"text":"Add the needed data manually in MS Word on a local PC","correct":false},{"id":3,"text":"Create a new page in the application and set up the columns","correct":false},{"id":4,"text":"Create a business process to generate the report","correct":false}]},{"id":4,"subContentId":"5b7294ff-1a7e-473b-8769-fb21204b4546","title":"What are the Creatio MS Word reports based on?","question":"What are the Creatio MS Word reports based on?","multiSelect":false,"answers":[{"id":1,"text":"Section records","correct":true},{"id":2,"text":"The [Dashboards] section data","correct":false},{"id":3,"text":"The lookup field values","correct":false},{"id":4,"text":"The numeric field values","correct":false},{"id":5,"text":"Data imported from Excel tables","correct":false}]},{"id":5,"subContentId":"83312e70-dfce-4a57-8e02-5010ac019c5b","title":"How can a user select a report available for printing?","question":"How can a user select a report available for printing?","multiSelect":false,"answers":[{"id":1,"text":"In the [Report setup] section","correct":false},{"id":2,"text":"In the section list page or on the record page in sections for which reports are configured","correct":true},{"id":3,"text":"In the [Documents] section","correct":false},{"id":4,"text":"In the [Printables] lookup","correct":false},{"id":5,"text":"In the [Printables] section","correct":false}]},{"id":6,"subContentId":"d41fa6b2-ad7a-4716-be8b-ddd96f1d54a5","title":"How can a user select a report available for printing? (2)","question":"How can a user select a report available for printing?","multiSelect":false,"answers":[{"id":1,"text":"In the [Report setup] section","correct":false},{"id":2,"text":"In the section list page or on the record page in sections, for which reports are configured","correct":true},{"id":3,"text":"In the Application Hub","correct":false},{"id":4,"text":"In the [Printables] lookup","correct":false},{"id":5,"text":"In the [Message templates] section","correct":false}]},{"id":7,"subContentId":"a41aa593-ef4b-41c9-8c06-dbde2f7eab8f","title":"Which data is displayed in the MS Word report tables?","question":"Which data is displayed in the MS Word report tables?","multiSelect":false,"answers":[{"id":1,"text":"Records connected to the primary report object","correct":true},{"id":2,"text":"Records of the primary report object","correct":false},{"id":3,"text":"Records containing numeric data only","correct":false},{"id":4,"text":"Object records that were added using basic macros","correct":false},{"id":5,"text":"Object records with reverse connection","correct":false}]},{"id":8,"subContentId":"895a5aec-4171-46a0-b3ca-2d1db5476af5","title":"What is the purpose of the [Web services] section in Creatio?","question":"What is the purpose of the [Web services] section in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Adding new low-code integrations with web services and web service setup","correct":true},{"id":2,"text":"Calling web services and processing of the received responses","correct":false},{"id":3,"text":"Managing installed applications","correct":false},{"id":4,"text":"Setting up business processes that contain the \u201cCall web service\u201d element","correct":false},{"id":5,"text":"Web service authentication","correct":false}]},{"id":9,"subContentId":"3bf2fed1-dced-4401-b1a7-f7b7fc922cc0","title":"How do you call a web service from Creatio?","question":"How do you call a web service from Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Set up and run a business process with the [Call web service] element","correct":true},{"id":2,"text":"Run the [Call web service] action from the page of the needed record in the [Web services] section","correct":false},{"id":3,"text":"Use developer tools","correct":false},{"id":4,"text":"Web services are called automatically after they are set up in the [Web services] section","correct":false}]},{"id":10,"subContentId":"d31cd5eb-d91b-4abb-b02c-24f471caf9da","title":"What will happen during executing this business process?","question":"What will happen during executing this business process in the picture? Click on the image to enlarge it for a better view.","multiSelect":false,"answers":[{"id":1,"text":"A pre-configured page will open whose fields will be populated with the currency exchange rates passed as a web service response","correct":true},{"id":2,"text":"Creatio will process the web service response and update the data in the [Currencies] lookup","correct":false},{"id":3,"text":"Creatio will call a web service to receive the current exchange rate and start processing the web service response","correct":false},{"id":4,"text":"The process will stop since the calling of a web service resulted in an error","correct":false}]},{"id":11,"subContentId":"a702b3c0-67ab-4936-992d-c8d19cdc5777","title":"What is the purpose of the [ML models] section in Creatio?","question":"What is the purpose of the [ML models] section in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Importing the data needed to train the machine learning models","correct":false},{"id":2,"text":"Setting up business processes that contain the \u201cPredict data\u201d element","correct":false},{"id":3,"text":"Creating and training the models for predictive analysis of data in Creatio","correct":true},{"id":4,"text":"Creating a set of commands that describe a problem to be solved by predictive analysis","correct":false},{"id":5,"text":"Creating a list of predictions generated during training the machine learning model","correct":false}]},{"id":12,"subContentId":"6c6e502c-2b87-447f-98db-b99adc53ebcb","title":"What is \u201cPredictive analysis\u201d in the Creatio terminology?","question":"What is \u201cPredictive analysis\u201d in the Creatio terminology?","multiSelect":false,"answers":[{"id":1,"text":"A tool that enables predicting future events based on large volumes of historical data and current facts","correct":true},{"id":2,"text":"A set of patterns obtained by a machine learning model as a result of processing historical data","correct":false},{"id":3,"text":"Processing of historical data by a machine learning model","correct":false},{"id":4,"text":"A branch of the AI designed to parse the patterns in large volumes of data","correct":false},{"id":5,"text":"Selection of Creatio records for training the machine learning models","correct":false}]},{"id":13,"subContentId":"d6393ee9-13ef-4b33-b47d-d03966a09c46","title":"What is the principle of training machine learning models in Creatio?","question":"What is the principle of training machine learning models in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Creatio analyzes the available historical data and identifies patterns and dependencies that are stored in the cloud and may further be used for predictions","correct":true},{"id":2,"text":"Creatio collects the data needed to resolve a business task and generates a request for the missing information","correct":false},{"id":3,"text":"Creatio determines the factors affecting the prediction and creates examples for training models based on the factor impact","correct":false},{"id":4,"text":"Creatio generates a business process with the \u2018Predict data\u201d element; it determines the patterns for making a prediction","correct":false}]},{"id":14,"subContentId":"1af69e60-41ea-45c4-94d2-3b9408a543c0","title":"Which Creatio users have access to the mobile app functionality?","question":"Which Creatio users have access to the mobile app functionality?","multiSelect":false,"answers":[{"id":1,"text":"External B2B portal users only","correct":false},{"id":2,"text":"Portal administrators only","correct":false},{"id":3,"text":"System administrators and System users only","correct":false},{"id":4,"text":"To all Creatio users","correct":true},{"id":5,"text":"Main application users with the system administrator permissions only","correct":false}]},{"id":15,"subContentId":"a604bad5-1be3-47c5-a27a-764e6c75c4bf","title":"What data is cached when synchronizing the mobile and the main applications?","question":"What data is cached when synchronizing the mobile and the main applications?","multiSelect":false,"answers":[{"id":1,"text":"The database structure only","correct":false},{"id":2,"text":"The data in the database only","correct":false},{"id":3,"text":"The database structure and the data","correct":true}]},{"id":16,"subContentId":"c749128d-dc8a-4dc9-ac26-12c1f862e4c2","title":"Is it possible to configure access to workplaces in Creatio?","question":"Is it possible to configure access to workplaces in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Yes, in Workplace setup","correct":true},{"id":2,"text":"Yes, in Application Hub","correct":false},{"id":3,"text":"No, all workplaces are available to all users","correct":false},{"id":4,"text":"Yes, in Object designer","correct":false}]},{"id":17,"subContentId":"0ccf68db-2bd8-4f33-8e56-097bbb885ce1","title":"Is it possible to set up a list of sections for the external users in Creatio?","question":"Is it possible to set up a list of sections for the external users in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Yes, use the [Portal setup] block of the System Designer","correct":false},{"id":2,"text":"Yes, use the \u201cPortal\u201d workplace in the Workplace setup","correct":true},{"id":3,"text":"Yes, use the \"Limited internal\" workplace in the Workplace setup","correct":false},{"id":4,"text":"No, the available sections are based solely on the user\u2019s license","correct":false}]},{"id":18,"subContentId":"6c80522b-68b2-43d3-ad7f-27f7341fac60","title":"What is the purpose of the [Translations] section in Creatio?","question":"What is the purpose of the [Translations] section in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Localizing Creatio elements, e.g., sections, lookups, into languages available in the system","correct":true},{"id":2,"text":"Managing the translations of company documents","correct":false},{"id":3,"text":"Localizing the resources of the Creatio core","correct":false},{"id":4,"text":"Managing the translations of marketing email templates and reports in Creatio","correct":false}]},{"id":19,"subContentId":"4e2ced3c-8dad-46ab-9b01-858e42e9e251","title":"How can one create a new application in Freedom UI?","question":"How can one create a new application in Freedom UI?","multiSelect":false,"answers":[{"id":1,"text":"Use the Application Hub to create a new application. Application can be created using one of the available templates","correct":true},{"id":2,"text":"Contact Creatio support to create a new application","correct":false},{"id":3,"text":"You can create a new application by creating a new package in the configuration","correct":false},{"id":4,"text":"An application can be created using a business process","correct":false}]},{"id":20,"subContentId":"fe439e2d-6bb8-4549-a2d4-6526664e64a1","title":"What elements can an application consist of in Freedom UI? Select all that apply.","question":"What elements can an application consist of in Freedom UI? Select all that apply.","multiSelect":true,"answers":[{"id":1,"text":"Pages","correct":true},{"id":2,"text":"Navigation and sections","correct":true},{"id":3,"text":"Business processes","correct":true},{"id":4,"text":"Integrations","correct":true},{"id":5,"text":"Organizational structure","correct":false},{"id":6,"text":"Deduplication methods","correct":false}]},{"id":21,"subContentId":"76c5626e-6a5f-40f5-8c02-62822162f9ee","title":"What is the difference between application and a package?","question":"What is the difference between application and a package?","multiSelect":false,"answers":[{"id":1,"text":"Application is a function block. It can include multiple packages and has its own parameters","correct":true},{"id":2,"text":"Application is the next evolutionary stage of a package. It enriches the package with additional metadata (like color, icon, etc.)","correct":false},{"id":3,"text":"Application is a new name for a package according to the undated terminology of Creatio 8.0 Atlas","correct":false},{"id":4,"text":"Application is an essential part of a package describing additional properties of the package\u2019s","correct":false}]},{"id":22,"subContentId":"92f610a4-8fd7-446e-887f-71353c71b23b","title":"What is the difference between application and a package? (2)","question":"What is the difference between application and a package?","multiSelect":false,"answers":[{"id":1,"text":"An application solves a business problem and a package is a combination of confuguration elements","correct":true},{"id":2,"text":"There is no difference. Application and package are synonyms","correct":false},{"id":3,"text":"An application is an UI element that is available in the Navigation Panel and a package is structural component that is connected to an object","correct":false},{"id":4,"text":"An application is a more modern term for a package","correct":false}]},{"id":23,"subContentId":"5a4bbf78-5dd0-43a3-a1ba-bbde878b845a","title":"What template should you choose to create an empty application?","question":"What template should you choose to create an empty application that contains only a package with no configuration element schemas?","multiSelect":false,"answers":[{"id":1,"text":"Records & Business processes","correct":false},{"id":2,"text":"Custom","correct":true},{"id":3,"text":"Install from file","correct":false},{"id":4,"text":"Marketplace powered","correct":false},{"id":5,"text":"Dashboards","correct":false}]},{"id":24,"subContentId":"36deb5f6-5cf5-4c86-a8ca-232bb9ced2b5","title":"What is displayed in the Navigation panel?","question":"What is displayed in the Navigation panel?","multiSelect":false,"answers":[{"id":1,"text":"Workplaces and Sections","correct":true},{"id":2,"text":"Applications","correct":false},{"id":3,"text":"Packages","correct":false},{"id":4,"text":"Objects and data models","correct":false},{"id":5,"text":"Pages","correct":false}]},{"id":25,"subContentId":"c3961b09-6ada-426b-8c35-7f887700678f","title":"How do you assign Desktop permissions in Creatio?","question":"How do you assign Desktop permissions in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"You can assign user permissions in the Desktop designer","correct":false},{"id":2,"text":"You can assign separate user permissions for each element on the Desktop","correct":false},{"id":3,"text":"You cannot manage Desktop permissions, they are configured by default","correct":false},{"id":4,"text":"The Desktop is visible to all users","correct":false},{"id":5,"text":"You can assign permissions via the Object permissions","correct":true}]},{"id":26,"subContentId":"a031e00c-62f1-4267-a439-0d160e9db654","title":"What is the purpose of Application Hub in Creatio?","question":"What is the purpose of Application Hub in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Managing Creatio apps of any complexity in the No-Code Designer","correct":true},{"id":2,"text":"Managing Customer database","correct":false},{"id":3,"text":"Configuring access permissions for different users","correct":false},{"id":4,"text":"Switching from Classic UI to Freedom UI","correct":false},{"id":5,"text":"Setting up Workplaces for different users","correct":false}]},{"id":27,"subContentId":"dd378b57-16a9-4362-855f-ea2285ee3aa7","title":"What is the purpose of Inputs elements in the UI designer?","question":"What is the purpose of Inputs elements in the UI designer?","multiSelect":false,"answers":[{"id":1,"text":"Displaying data","correct":true},{"id":2,"text":"Modifying the structure of the data model","correct":false},{"id":3,"text":"Enabling users to take a wide variety of actions, from opening record pages to setting up access permissions","correct":false},{"id":4,"text":"Grouping Freedom UI elements by multiple criteria","correct":false}]},{"id":28,"subContentId":"231e5752-4a29-4867-98e8-2da3d3d38ce7","title":"What is an \u201cObject\u201d from Creatio standpoint?","question":"What is an \u201cObject\u201d from Creatio standpoint?","multiSelect":false,"answers":[{"id":1,"text":"Any element added to a record page of a section","correct":false},{"id":2,"text":"An additional page configured for a section","correct":false},{"id":3,"text":"A data entity that represents a certain business category. Used to generate sections, objects, and lookups.","correct":true},{"id":4,"text":"An UI element for viewing and updating the contents of columns","correct":false},{"id":5,"text":"A set of sections displayed on the Creatio side panel for specific user groups","correct":false}]}]},{"ok":true,"pageTitle":"Sales Creatio Quiz","activityTitle":"BPM tools","href":"https://academy.creatio.com/group/23/module/58/restart-activity/62","itemId":"62","type":"restart-activity","contentId":26,"h5pLibrary":"H5P.QuestionSet 1.20","originalPoolSize":3,"totalQuestions":12,"randomQuestions":true,"progressType":"textual","questions":[{"id":1,"subContentId":"abf33f57-4a8c-48ed-839b-212f36e0eb96","title":"What is a business process?","question":"What is a business process? Select the option that describes it best.","multiSelect":false,"answers":[{"id":1,"text":"Arbitrary set of actions performed by user at his own discretion for solving the needed tasks","correct":false},{"id":2,"text":"A certain sequence of steps enabling to achieve specific result","correct":true},{"id":3,"text":"An action that needs to be performed by a specific employee at a specific time","correct":false},{"id":4,"text":"Example of successful implementation of a task","correct":false}]},{"id":2,"subContentId":"cfaa0565-fb6a-46b6-aefe-b7564ab1f63d","title":"What is a business process? (2)","question":"What is a business process? Select the option that describes it best.","multiSelect":false,"answers":[{"id":1,"text":"A business process is any set of actions performed by user at his own discretion to solve a task","correct":false},{"id":2,"text":"A business process is a certain sequence of steps that allows to achieve specific result","correct":true},{"id":3,"text":"A business process is an action that needs to be performed by a specific employee at a specific time","correct":false},{"id":4,"text":"A business process is a set of task performed by business users","correct":false}]},{"id":3,"subContentId":"87426342-c29b-4365-a92a-58ac61794e55","title":"What is the purpose of process parameters in Creatio?","question":"What is the purpose of process parameters in Creatio? Select all that apply.","multiSelect":true,"answers":[{"id":1,"text":"Exchange data between process elements","correct":true},{"id":2,"text":"Open the edit page","correct":false},{"id":3,"text":"Determining the specifics of process element execution, e.g., if a record is created as part of a business process, parameters can determine which fields will be populated and how","correct":true},{"id":4,"text":"Saving intermediate information during a business process flow","correct":true},{"id":5,"text":"Performing a pre-configured custom action in a business process","correct":false}]},{"id":4,"subContentId":"83bf9d88-bf05-4dc7-aec3-1b31bba14395","title":"What do you use intermediate events for?","question":"What do you use intermediate events for?","multiSelect":false,"answers":[{"id":1,"text":"To launch a process","correct":false},{"id":2,"text":"To wait for specific trigger events or interaction between multiple business processes","correct":true},{"id":3,"text":"To terminate a process","correct":false},{"id":4,"text":"To branch out the process","correct":false}]},{"id":5,"subContentId":"6de8d27a-fa11-4897-ace4-b5845916b632","title":"What is the purpose of gateways in a business process diagram?","question":"What is the purpose of gateways in a business process diagram?","multiSelect":false,"answers":[{"id":1,"text":"Managing the process flows: converging and diverging the sequence flows depending on the alternative paths","correct":true},{"id":2,"text":"Catching process events and signals","correct":false},{"id":3,"text":"Stopping the process flow execution for a particular period","correct":false},{"id":4,"text":"Terminating the process flow","correct":false},{"id":5,"text":"Changing the process participants at a certain stage of the process execution","correct":false}]},{"id":6,"subContentId":"a2f47c69-2283-4d8f-be7e-cca1d44ef63f","title":"Where do you view the process execution history in Creatio?","question":"Where do you view the process execution history in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"The [Process library] section","correct":false},{"id":2,"text":"The [Activities] section","correct":false},{"id":3,"text":"The [Process log] section","correct":true},{"id":4,"text":"The [Business process tasks] tab of the communication panel","correct":false},{"id":5,"text":"The [Change log] section","correct":false}]},{"id":7,"subContentId":"7616af56-dfd2-4605-adb4-cab686a4fc23","title":"What is business process tracing used for?","question":"What is business process tracing used for?","multiSelect":false,"answers":[{"id":1,"text":"To fix errors during the execution of the process","correct":false},{"id":2,"text":"To track process element parameters in each process element","correct":true},{"id":3,"text":"To track process versions","correct":false},{"id":4,"text":"To keep track of who is responsible for each process instance","correct":false},{"id":5,"text":"To track process execution time","correct":false}]},{"id":8,"subContentId":"77471574-0621-4775-97c8-58232b1e46f2","title":"What is the purpose of the Case Designer in Creatio?","question":"What is the purpose of the Case Designer in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Automating, building and customizing the stages of non-linear business processes","correct":true},{"id":2,"text":"Designing, constructing and customizing the steps of linear business processes with a clear algorithm","correct":false},{"id":3,"text":"Debugging business processes and cases","correct":false},{"id":4,"text":"Tracing the execution of business process elements that run in the background","correct":false}]},{"id":9,"subContentId":"b36ff90e-ff8b-4b17-9dc6-2e838fa7a39e","title":"What happens in Creatio if you delete a stage from the progress bar?","question":"What happens in Creatio if you delete a stage from the progress bar?","multiSelect":false,"answers":[{"id":1,"text":"The stage will be deleted from the list of the corresponding lookup values","correct":false},{"id":2,"text":"The stage steps will remain and will run in the background","correct":false},{"id":3,"text":"The case status will automatically change to \u201cCanceled\u201d","correct":false},{"id":4,"text":"The case steps will be deleted but the stage value will remain in the corresponding lookup","correct":true},{"id":5,"text":"The stage will only be deleted for the current case session and will be restored at the next session","correct":false}]},{"id":10,"subContentId":"04a78b7d-807e-4faf-8a3a-90ff4ef6093f","title":"How do you launch a dynamic case in Creatio?","question":"How do you launch a dynamic case in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"In the section list, click the \u201cRun case for section\u201d action","correct":false},{"id":2,"text":"Run the corresponding business process in the process library","correct":false},{"id":3,"text":"Manually run the case by clicking its first stage on the record page","correct":false},{"id":4,"text":"The case launches automatically when a new record that matches the case conditions is created","correct":true},{"id":5,"text":"The case starts automatically once the case section record is opened","correct":false}]},{"id":11,"subContentId":"72269138-cbca-4772-9bbd-2a2986ec9b2b","title":"How do you launch a dynamic case in Creatio? (2)","question":"How do you launch a dynamic case in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Create a button \u201cLaunch case\u201d on a section list page","correct":false},{"id":2,"text":"A user needs to run a corresponding business process from the run process button","correct":false},{"id":3,"text":"A dynamic case is launched for any new record in the system","correct":false},{"id":4,"text":"The case launches automatically when a new record that matches the case conditions is created","correct":true},{"id":5,"text":"The case starts automatically once the record page is opened","correct":false}]},{"id":12,"subContentId":"20a92f05-4a8d-4de3-b8c9-99eb153c1105","title":"What is the difference between user actions and system actions?","question":"What is the difference between user actions and system actions?","multiSelect":false,"answers":[{"id":1,"text":"User actions are used when user will be interacting with the system (e.g., completing tasks, filling out forms etc.) and system actions run in background and executed automatically","correct":true},{"id":2,"text":"User actions apply only to active users, while system actions apply throughout the system","correct":false},{"id":3,"text":"System actions can only be completed by Supervisor, while user actions are accessible to all users of the system","correct":false},{"id":4,"text":"User actions can be performed by any user, while system actions require validation from system administrators","correct":false}]}]},{"ok":true,"pageTitle":"Sales Creatio Quiz","activityTitle":"Administration","href":"https://academy.creatio.com/group/23/module/58/restart-activity/61","itemId":"61","type":"restart-activity","contentId":25,"h5pLibrary":"H5P.QuestionSet 1.20","originalPoolSize":4,"totalQuestions":25,"randomQuestions":true,"progressType":"textual","questions":[{"id":1,"subContentId":"3c73ea33-0b52-4b31-a1a3-cf0e48758360","title":"Can you add new sections to the portal?","question":"Can you add new sections to the portal?","multiSelect":false,"answers":[{"id":1,"text":"Yes, if you use External B2B or External B2C licenses","correct":true},{"id":2,"text":"Yes, if you use Self-service Portal licenses","correct":false},{"id":3,"text":"No","correct":false},{"id":4,"text":"Yes, if you use any type of portal licenses","correct":false}]},{"id":2,"subContentId":"2e439153-5a37-4530-ab2a-840b8be3b350","title":"Can you manage permissions for portal users?","question":"Can you manage permissions for portal users?","multiSelect":false,"answers":[{"id":1,"text":"Yes","correct":true},{"id":2,"text":"No","correct":false},{"id":3,"text":"Yes, provided you have additional licenses that enable managing access permissions","correct":false},{"id":4,"text":"Yes, but only for the \u201cKnowledge base\u201d and \u201cCases\u201d sections","correct":false}]},{"id":3,"subContentId":"d798b734-3353-4089-97f7-1c13ee050313","title":"What is a \u201cportal\u201d from the Creatio standpoint?","question":"What is a \u201cportal\u201d from the Creatio standpoint?","multiSelect":false,"answers":[{"id":1,"text":"A component that provides a way to manage opportunities for Creatio partners","correct":false},{"id":2,"text":"A component that provides secure and managed limited access to Creatio data and functionality to internal and external users (e.g., customers, partners, contractors, stakeholders, etc.)","correct":true},{"id":3,"text":"A separately designed Creatio messenger used by the support team","correct":false},{"id":4,"text":"A communication channel for the support lines of different levels","correct":false},{"id":5,"text":"A community where Creatio developers exchange their expertise","correct":false}]},{"id":4,"subContentId":"8daaca38-85f1-426f-99f2-981f9525c31d","title":"What user licenses allow to access Creatio portal?","question":"What user licenses allow to access Creatio portal? Select all that apply.","multiSelect":true,"answers":[{"id":1,"text":"Self-service portal","correct":true},{"id":2,"text":"External B2C","correct":true},{"id":3,"text":"External B2B","correct":true},{"id":4,"text":"Supplier portal","correct":false},{"id":5,"text":"Employee portal","correct":false}]},{"id":5,"subContentId":"9e704859-09c1-42c6-b5ab-cd8ff6d196b4","title":"How do you manage access permissions to data and functionality in Creatio?","question":"How do you manage access permissions to data and functionality in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"You can grant permissions to individual users only","correct":false},{"id":2,"text":"You can grant permissions to user groups (roles) and departments","correct":false},{"id":3,"text":"You can grant permissions to individual users as well as to user groups (roles)","correct":true},{"id":4,"text":"You can grant permissions for individual contacts","correct":false},{"id":5,"text":"You can grant permissions to separate roles only","correct":false}]},{"id":6,"subContentId":"76fc4ccd-009c-4968-903f-5fe1b9b944df","title":"What is the principle of permission inheritance between organizational roles in Creatio?","question":"What is the principle of permission inheritance between organizational roles in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Parent roles inherit all access permissions that have been set up for their subordinate roles","correct":false},{"id":2,"text":"Subordinate roles inherit all access permissions that have been set up for their parent role","correct":true},{"id":3,"text":"Parent roles do not pass their permissions over to subordinate roles","correct":false},{"id":4,"text":"Parent and subordinate roles have no connection in terms of permissions whatsoever","correct":false},{"id":5,"text":"Parent roles inherit permissions from the managers of their subordinate roles","correct":false}]},{"id":7,"subContentId":"9c9cb876-c8a1-45a0-b4e7-e4cb89a17d26","title":"What primary types of access permissions do you grant in Creatio?","question":"What primary types of access permissions do you grant in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Access to objects and system operations","correct":true},{"id":2,"text":"Developer access and user access","correct":false},{"id":3,"text":"Portal access and application access","correct":false},{"id":4,"text":"Customization access and configuration access","correct":false},{"id":5,"text":"Permanent access and temporary access","correct":false}]},{"id":8,"subContentId":"4d732fce-0b97-4eeb-b3cf-8e75d086a5a3","title":"What are the available levels of object permissions in Creatio?","question":"What are the available levels of object permissions in Creatio? Select all that apply.","multiSelect":true,"answers":[{"id":1,"text":"Operation permissions","correct":true},{"id":2,"text":"Detail permissions","correct":false},{"id":3,"text":"Record permissions","correct":true},{"id":4,"text":"Column permissions","correct":true},{"id":5,"text":"Tab permissions","correct":false}]},{"id":9,"subContentId":"9e027c7a-f564-4ea7-985a-68773a1aa185","title":"What is a server license?","question":"What is a \"server license\"?","multiSelect":false,"answers":[{"id":1,"text":"A license that enables access to specific functionality","correct":true},{"id":2,"text":"A license that enables product access to certain users only","correct":false},{"id":3,"text":"A license that enables administrator access","correct":false},{"id":4,"text":"This type of license doesn't exist","correct":false}]},{"id":10,"subContentId":"8d04b77e-07a1-4782-8adf-6b00b3f6e041","title":"What is a personal license?","question":"What is a \"personal license\"?","multiSelect":false,"answers":[{"id":1,"text":"A license that enables access to the product for certain users only","correct":true},{"id":2,"text":"A license that enables access to the product for certain user roles only","correct":false},{"id":3,"text":"A license that enables access to specific functionality","correct":false}]},{"id":11,"subContentId":"114ddcbc-c7c5-4a36-b5f5-93470d465035","title":"How do you license a separate user record in Creatio?","question":"How do you license a separate user record in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Select the \u201cActive\u201d checkbox on the record page of the needed user to run the automatic license distribution","correct":false},{"id":2,"text":"Run the [Distribute licenses] action on the record page of the needed user","correct":false},{"id":3,"text":"Select the products to license on the [Licenses] tab of the user record page","correct":true},{"id":4,"text":"In the [System users] section, you can only distribute multiple licenses to user groups","correct":false},{"id":5,"text":"Run the [Distribute licenses] in the [System users] section list and select the needed user in the opened window","correct":false}]},{"id":12,"subContentId":"60088458-43eb-44e0-b26e-890e3a92c124","title":"What is the purpose of the [Change log] section in Creatio?","question":"What is the purpose of the [Change log] section in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Storage of backups in the system and possibility to restore the old application versions","correct":false},{"id":2,"text":"Storage of information about adding, editing, and deleting data in Creatio","correct":true},{"id":3,"text":"Editing system settings","correct":false},{"id":4,"text":"Registering updates and fixed errors in different release versions","correct":false},{"id":5,"text":"Registering information about changing the user role structure and access permissions settings","correct":false}]},{"id":13,"subContentId":"71542cdb-65e0-40da-a228-1d986427f27c","title":"What is the purpose of the [Audit log] section in Creatio?","question":"What is the purpose of the [Audit log] section in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Storage of information about the interaction of system users with external applications","correct":false},{"id":2,"text":"Automatic registration of changes in the role structure, access permissions, system settings, and user authorization","correct":true},{"id":3,"text":"Storage of information about adding, editing, and deleting data in Creatio","correct":false},{"id":4,"text":"Storage of information about system administrators\u2019 actions","correct":false},{"id":5,"text":"Registering financial metrics, account reports, and tax inspection results","correct":false}]},{"id":14,"subContentId":"255ac451-ff6b-4a61-93f6-ecdbe5ccad8e","title":"What is the purpose of the [Lookups] section?","question":"What is the purpose of the [Lookups] section?","multiSelect":false,"answers":[{"id":1,"text":"Creating email templates for marketing purposes","correct":false},{"id":2,"text":"Storing information about the provided services and their specifications","correct":false},{"id":3,"text":"Managing section details","correct":false},{"id":4,"text":"Managing system objects that store pre-set values for the specific type of fields in Creatio","correct":true},{"id":5,"text":"Setting up reports based on Creatio data","correct":false}]},{"id":15,"subContentId":"0f02c9f9-b969-4bf5-b945-b3f486f6c026","title":"Which of the below does not synchronize with Creatio (MS 365/Exchange)?","question":"Which of the below does not synchronize with Creatio when integrating with the Microsoft 365 and Microsoft Exchange mail services? Select all that apply.","multiSelect":true,"answers":[{"id":1,"text":"Mail","correct":false},{"id":2,"text":"Contacts","correct":true},{"id":3,"text":"Calendars","correct":false},{"id":4,"text":"User files","correct":true}]},{"id":16,"subContentId":"775ea6f9-33cc-45a5-b2b1-136c4dbebae0","title":"What is the purpose of using integration with the LDAP catalog in Creatio?","question":"What is the purpose of using integration with the LDAP catalog in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Synchronization of the LDAP catalog elements with users and roles in Creatio","correct":true},{"id":2,"text":"Synchronization of user calendars in different devices and activities in Creatio","correct":false},{"id":3,"text":"Importing contact information from the LDAP catalog to Creatio","correct":false},{"id":4,"text":"Updating the client base","correct":false},{"id":5,"text":"Synchronization of data in different application localizations","correct":false}]},{"id":17,"subContentId":"e57c91fc-97ca-4ec1-a00c-9bd469423612","title":"Which of these integrations with third-party services are available in Creatio?","question":"Which of these integrations with third-party services are available in Creatio? Select all that apply.","multiSelect":true,"answers":[{"id":1,"text":"OData","correct":true},{"id":2,"text":"The \"Web-services\" functions in business processes","correct":true},{"id":3,"text":"Integrations through Cloud Service Store","correct":false},{"id":4,"text":"Due to security considerations, Creatio does not support integration","correct":false}]},{"id":18,"subContentId":"e80d33ac-ea9e-425e-a2dd-a29445ac65c7","title":"Which Creatio integrations are available out-of-the-box?","question":"Which Creatio integrations are available out-of-the-box? Select all that apply.","multiSelect":true,"answers":[{"id":1,"text":"IMAP/SMTP, MS Exchange email integration","correct":true},{"id":2,"text":"QlikView","correct":false},{"id":3,"text":"Messengers (Facebook, Telegram, WhatsApp)","correct":true},{"id":4,"text":"LDAP","correct":true},{"id":5,"text":"Contact synchronization between Google Contacts and Microsoft Exchange","correct":true},{"id":6,"text":"Mass mailing providers (SendGrid)","correct":true},{"id":7,"text":"Monitoring systems (Munin, Cacti)","correct":false},{"id":8,"text":"Calendar synchronization between Google Contacts and MS Exchange","correct":true}]},{"id":19,"subContentId":"862a85fa-ffc4-445e-b8fd-6f73a805053c","title":"Which DBMS does Creatio support?","question":"Which DBMS does Creatio support? Select all that apply.","multiSelect":true,"answers":[{"id":1,"text":"Microsoft SQL","correct":true},{"id":2,"text":"Oracle DB","correct":true},{"id":3,"text":"MySQL","correct":false},{"id":4,"text":"PostgreSQL","correct":true}]},{"id":20,"subContentId":"7bfd6feb-23f4-469c-9da2-0a5bb7f5ab74","title":"What is \u201cOn-site deployment\u201d in the Creatio terminology?","question":"What is \u201cOn-site deployment\u201d in the Creatio terminology?","multiSelect":false,"answers":[{"id":1,"text":"Deploying of application on the customer\u2019s servers","correct":true},{"id":2,"text":"Deploying of application on Creatio\u2019s servers","correct":false},{"id":3,"text":"Application operation in the SaaS model \u201cin the cloud\u201d of the vendor","correct":false},{"id":4,"text":"Deploying of the application test version","correct":false},{"id":5,"text":"Deploying of a certain application localization","correct":false}]},{"id":21,"subContentId":"cd48097b-a42d-40a7-97e7-02d3812907b3","title":"What is the purpose of the SVN in Creatio?","question":"What is the purpose of the subversion control server (SVN) in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Storing business data and configuration settings","correct":false},{"id":2,"text":"Storing the history of configuration states and transferring changes between configurations","correct":true},{"id":3,"text":"Storing service time information for the application server","correct":false}]},{"id":22,"subContentId":"a25ea60d-a14f-43a4-8455-9cbad79f0e7c","title":"What data caching server is used in Creatio?","question":"What data caching server is used in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"Memcached","correct":false},{"id":2,"text":"Redis","correct":true},{"id":3,"text":"Varnish","correct":false},{"id":4,"text":"XCache","correct":false}]},{"id":23,"subContentId":"ea845bd4-d29f-4c9c-b2e0-9e804d0bf677","title":"What browsers are used for working with Creatio products?","question":"What browsers are used for working with Creatio products on a user computer? Select all that apply.","multiSelect":true,"answers":[{"id":1,"text":"Google Chrome","correct":true},{"id":2,"text":"Mozilla Firefox","correct":true},{"id":3,"text":"Microsoft Edge","correct":true},{"id":4,"text":"Safari","correct":true}]},{"id":24,"subContentId":"eaaa8d44-dea4-4bcd-ab7a-fc7446dfc9d0","title":"What web services communication protocols are available for integration?","question":"What web services communication protocols are available for integration with Web services section? Select all that apply.","multiSelect":true,"answers":[{"id":1,"text":"SOAP","correct":true},{"id":2,"text":"WSFL","correct":false},{"id":3,"text":"UDDI","correct":false},{"id":4,"text":"REST","correct":true},{"id":5,"text":"BEEP","correct":false}]},{"id":25,"subContentId":"05cd688d-0be5-4791-a6f9-3cbedcf33b16","title":"Which of the following statements best describes the External B2B license?","question":"Which of the following statements best describes the External B2B license?","multiSelect":false,"answers":[{"id":1,"text":"A group corporate license allowing users from other organizations to have a limited access to platform","correct":false},{"id":2,"text":"This license is designed for company employees who to perform one type of tasks in Creatio","correct":false},{"id":3,"text":"A license that grants access to the counterparties users to a single selected section","correct":false},{"id":4,"text":"This is a license for a user from an outside organization who must work with certain records and sections of the platform","correct":true}]}]},{"ok":true,"pageTitle":"Sales Creatio Quiz","activityTitle":"Service Delivery management","href":"https://academy.creatio.com/group/23/module/58/restart-activity/73","itemId":"73","type":"restart-activity","contentId":37,"h5pLibrary":"H5P.QuestionSet 1.20","originalPoolSize":2,"totalQuestions":4,"randomQuestions":true,"progressType":"textual","questions":[{"id":1,"subContentId":"31c8ff9a-8300-4947-9afe-e0164ddb5a95","title":"What is the most correct approach to organizing the development of design solutions?","question":"What is the most correct approach to organizing the development of design solutions on the Creatio platform?","multiSelect":false,"answers":[{"id":1,"text":"It is recommended to use 3 environments (development, testing and production) in case of on-site deployment, and 2 environments (testing and production) in case of cloud deployment","correct":true},{"id":2,"text":"It is recommended to use the production environment for development, since package mechanics allows development without the threat of disrupting product operation","correct":false},{"id":3,"text":"It is recommended to use 2 environments (testing and production) for all types of deployment","correct":false}]},{"id":2,"subContentId":"abc5990f-7362-45ad-a790-9312b992496a","title":"What packages will be modified during a vendor (Creatio) update?","question":"What packages will be modified during a vendor (Creatio) update?","multiSelect":false,"answers":[{"id":1,"text":"Base packages","correct":true},{"id":2,"text":"Base and custom packages","correct":false},{"id":3,"text":"Updating does not affect the existing packages, it only creates new ones","correct":false},{"id":4,"text":"Custom packages","correct":false}]},{"id":3,"subContentId":"2e5b2609-d1a8-4ea0-8eee-6682cede52ed","title":"What is a base package in Creatio?","question":"What is a \"base package\" in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"One or more packages that deliver default Creatio features and functions","correct":true},{"id":2,"text":"Packages that store database data","correct":false},{"id":3,"text":"A package that is used for transferring changes between configurations","correct":false}]},{"id":4,"subContentId":"a1721508-30fc-4931-b79b-076026b047a6","title":"What is a package in Creatio?","question":"What is a package in Creatio?","multiSelect":false,"answers":[{"id":1,"text":"A system for storing cached data","correct":false},{"id":2,"text":"A set of vendor-developed solutions","correct":false},{"id":3,"text":"Data container storing configuration settings","correct":true},{"id":4,"text":"Access rights management system","correct":false}]}]},{"ok":true,"pageTitle":"Sales Creatio Quiz","activityTitle":"Relational data modeling","href":"https://academy.creatio.com/group/23/module/58/restart-activity/70","itemId":"70","type":"restart-activity","contentId":34,"h5pLibrary":"H5P.QuestionSet 1.20","originalPoolSize":1,"totalQuestions":6,"randomQuestions":true,"progressType":"textual","questions":[{"id":1,"subContentId":"4a2f80a4-1ac4-462b-b9de-cd8b15fa6996","title":"What are the different types of relationships in relational databases?","question":"What are the different types of relationships in relational databases?","multiSelect":true,"answers":[{"id":1,"text":"One-to-one","correct":true},{"id":2,"text":"One-to-many","correct":true},{"id":3,"text":"One-to-several","correct":false},{"id":4,"text":"Few-to-few","correct":false}]},{"id":2,"subContentId":"d0098dbd-d132-4f3d-be58-6e02ee6e0d11","title":"Connect multiple drivers to a single automobile","question":"You've created a section which stores data about cars for a taxi service. Describe a way to connect multiple drivers to a single automobile.","multiSelect":false,"answers":[{"id":1,"text":"Make a lookup for the Contacts section","correct":false},{"id":2,"text":"Task cannot be completed","correct":false},{"id":3,"text":"Create a separate object that stores information about a contact and an automobile","correct":true},{"id":4,"text":"Make a comma delineated text string","correct":false}]},{"id":3,"subContentId":"ee073a81-2347-4355-8111-3485eaa4e4d8","title":"Best way to store information about the source of a contact's revenue stream?","question":"What is the best way to store information about the source of a contact's revenue stream?","multiSelect":false,"answers":[{"id":1,"text":"Create a new record in the \"Accounts\" section for each revenue stream","correct":false},{"id":2,"text":"Make a text field called \"Revenue sources\" in the Contact section","correct":false},{"id":3,"text":"Create a separate object called 'Revenue sources' that can connect to Contacts","correct":true}]},{"id":4,"subContentId":"1eafc07e-e4f0-4f60-9716-faa09e0f7683","title":"Link articles to cases (many-to-many)","question":"There are 2 tables in the database: \"Cases\" and \"Knowledge Base Articles\". Your task is to link articles to cases so that you can later understand which cases are used in a particular knowledge-based article and which knowledge-based articles were used in a particular case. How would you set up such a relationship?","multiSelect":false,"answers":[{"id":1,"text":"Create an associative table to set up the relationship between cases and articles","correct":true},{"id":2,"text":"Create an \"Article\" column in Cases table","correct":false},{"id":3,"text":"Create a \"Cases\" column in Knowledge based article table","correct":false},{"id":4,"text":"The task cannot be resolved","correct":false}]},{"id":5,"subContentId":"fccd7ff1-9458-4c64-a287-cb71da2e1e09","title":"Relationship between drivers and automobiles in car sharing","question":"You've created a section which stores data about cars for a car sharing service. Describe an appropriate way to establish a relationship between drivers and automobiles that allows you to track which automobiles were used by a specific driver and track which drivers have used a specific automobile.","multiSelect":false,"answers":[{"id":1,"text":"Make a lookup for the Contacts section","correct":false},{"id":2,"text":"Task cannot be completed","correct":false},{"id":3,"text":"Create a separate object that stores information about a contact and an automobile","correct":true},{"id":4,"text":"Make a comma delineated text string","correct":false}]},{"id":6,"subContentId":"45f6749a-c73e-4a13-bd0e-8ddc64d41604","title":"Track tools borrowed by artisans","question":"You are managing an artisan workshop that allows artisans (referred to as Contacts) to borrow tools to work from home. You already have the \"Tools\" section. You need to track which tools are currently held by an artisan. Describe the simplest and most effective way to achieve this.","multiSelect":false,"answers":[{"id":1,"text":"Create a data model that will include both artisan and tool columns. Register it as a section to track the tools allocation.","correct":false},{"id":2,"text":"Add \"current artisan\" column to the \"Tools\" data model. Then add \"Tools\" list to the Contact page and filter that list by \"current artisan\" column.","correct":true},{"id":3,"text":"Add the \"Tools\" lookup on the Contact page.","correct":false},{"id":4,"text":"Create a data model and use it as a detail on the \"Tool\" to track this information.","correct":false}]}]},{"ok":true,"pageTitle":"Sales Creatio Quiz","activityTitle":"Business process modeling in Creatio","href":"https://academy.creatio.com/group/23/module/58/restart-activity/63","itemId":"63","type":"restart-activity","contentId":27,"h5pLibrary":"H5P.QuestionSet 1.20","originalPoolSize":2,"totalQuestions":10,"randomQuestions":true,"progressType":"textual","questions":[{"id":1,"question":"Your customer is a recycling plant that wants to automate requests for repair and maintenance of its equipment. Which Creatio product would you recommend and why?","multiSelect":false,"answers":[{"id":1,"text":"Correct","correct":true},{"id":2,"text":"Incorrect","correct":false}]},{"id":2,"question":"The client is a small online retailer who wants to manage orders in a CRM. What products and what blocks of Creatio functionality should be used for this?","multiSelect":false,"answers":[{"id":1,"text":"Correct","correct":true},{"id":2,"text":"Incorrect","correct":false}]},{"id":3,"question":"The client is a major retailer that wants to automate its marketing campaigns. Which Creatio product would you recommend as a solution?","multiSelect":false,"answers":[{"id":1,"text":"Correct","correct":true},{"id":2,"text":"Incorrect","correct":false}]},{"id":4,"question":"The client wants to automate email newsletters to get leads. What blocks of functionality and Creatio products should be used for this?","multiSelect":false,"answers":[{"id":1,"text":"Correct","correct":true},{"id":2,"text":"Incorrect","correct":false}]},{"id":5,"question":"Create a model business process to automate a taxi service: from calling a taxi to completing the trip. List the participants and stages of the process.","multiSelect":false,"answers":[{"id":1,"text":"Correct","correct":true},{"id":2,"text":"Incorrect","correct":false}]},{"id":6,"question":"Please list the Creatio products and functionalities that you would recommend to a travel agency. Explain why.","multiSelect":false,"answers":[{"id":1,"text":"Correct","correct":true},{"id":2,"text":"Incorrect","correct":false}]},{"id":7,"question":"The client is a Nonprofit organization that wants to attract an audience with the help of marketing communications (email, instant messengers) to events. Which Creatio product would you recommend?","multiSelect":false,"answers":[{"id":1,"text":"Correct","correct":true},{"id":2,"text":"Incorrect","correct":false}]},{"id":8,"question":"Your client is a car rental business. Which Creatio product would you recommend and why?","multiSelect":false,"answers":[{"id":1,"text":"Correct","correct":true},{"id":2,"text":"Incorrect","correct":false}]},{"id":9,"question":"Create a model business process for ordering pizza. Include as many stages and actors as necessary.","multiSelect":false,"answers":[{"id":1,"text":"Correct","correct":true},{"id":2,"text":"Incorrect","correct":false}]},{"id":10,"question":"Your client is a luxury furniture manufacturer that creates custom interiors and furniture pieces. What Creatio product would you recommend for this client and why?","multiSelect":false,"answers":[{"id":1,"text":"Correct","correct":true},{"id":2,"text":"Incorrect","correct":false}]}]},{"ok":true,"pageTitle":"Sales Creatio Quiz","activityTitle":"Requirements management","href":"https://academy.creatio.com/group/23/module/58/restart-activity/71","itemId":"71","type":"restart-activity","contentId":35,"h5pLibrary":"H5P.QuestionSet 1.20","originalPoolSize":1,"totalQuestions":6,"randomQuestions":true,"progressType":"textual","questions":[{"id":1,"question":"The client is a non-profit organization. What questions would you ask to gather technical design requirements for the project?","multiSelect":false,"answers":[{"id":1,"text":"Correct","correct":true},{"id":2,"text":"Incorrect","correct":false}]},{"id":2,"question":"The client provides software development and consulting services. What questions would you ask to gather technical design requirements for the project?","multiSelect":false,"answers":[{"id":1,"text":"Correct","correct":true},{"id":2,"text":"Incorrect","correct":false}]},{"id":3,"question":"The client is a real-estate agency. What questions would you ask to gather technical design requirements for the project?","multiSelect":false,"answers":[{"id":1,"text":"Correct","correct":true},{"id":2,"text":"Incorrect","correct":false}]},{"id":4,"question":"The client is an advertising agency. What questions would you ask to gather technical design requirements for the project?","multiSelect":false,"answers":[{"id":1,"text":"Correct","correct":true},{"id":2,"text":"Incorrect","correct":false}]},{"id":5,"question":"Your client is a travel agency. What questions would you ask to gather technical design requirements for the project?","multiSelect":false,"answers":[{"id":1,"text":"Correct","correct":true},{"id":2,"text":"Incorrect","correct":false}]},{"id":6,"question":"The client is an investment management agency. What questions would you ask to gather technical design requirements for the project?","multiSelect":false,"answers":[{"id":1,"text":"Correct","correct":true},{"id":2,"text":"Incorrect","correct":false}]}]},{"ok":true,"pageTitle":"Sales Creatio Quiz","activityTitle":"Project Troubleshooting","href":"https://academy.creatio.com/group/23/module/58/restart-activity/69","itemId":"69","type":"restart-activity","contentId":33,"h5pLibrary":"H5P.QuestionSet 1.20","originalPoolSize":2,"totalQuestions":5,"randomQuestions":true,"progressType":"textual","questions":[{"id":1,"question":"What is the role of the business analyst after the launch of the project?","multiSelect":false,"answers":[{"id":1,"text":"Correct","correct":true},{"id":2,"text":"Incorrect","correct":false}]},{"id":2,"question":"During a discussion about the priorities for the next release, the customer asks about changes that will affect the platform functionality of Creatio, specifically those implemented in the base packages. What would you do in this situation?","multiSelect":false,"answers":[{"id":1,"text":"Correct","correct":true},{"id":2,"text":"Incorrect","correct":false}]},{"id":3,"question":"Your customer works with a cloud instance of the application and complains that the web site is not operational (though the Internet connection works fine). What are your actions?","multiSelect":false,"answers":[{"id":1,"text":"Correct","correct":true},{"id":2,"text":"Incorrect","correct":false}]},{"id":4,"question":"How would you avoid the negative reaction of end users when demonstrating the implemented solution?","multiSelect":false,"answers":[{"id":1,"text":"Correct","correct":true},{"id":2,"text":"Incorrect","correct":false}]},{"id":5,"question":"You are a business analyst in an implemented Creatio project. The client informs you that sales managers do not use Creatio functionality to manage sales. What are your actions?","multiSelect":false,"answers":[{"id":1,"text":"Correct","correct":true},{"id":2,"text":"Incorrect","correct":false}]}]}]}
